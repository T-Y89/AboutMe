name: CI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-label:
    runs-on: ubuntu-latest
    outputs:
      has_label: ${{ steps.check_label.outputs.has_label }}
    steps:
      - name: Check for skip-ci label
        id: check_label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const hasLabel = labels.some(l => l.name === 'skip-ci');
            core.setOutput('has_label', hasLabel.toString());
            if (hasLabel) core.info('skip-ci label found — skipping CI');

  build:
    needs: check-label
    if: needs.check-label.outputs.has_label == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dummy CI
        run: echo "CI passed!"
